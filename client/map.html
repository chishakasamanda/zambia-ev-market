<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<title>Charging Stations</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
:root{
  --ev-green:#16c784;
  --ev-blue:#3aa0ff;
  --bg:#0b1220;
}


body {
  margin: 0;
  font-family: 'Poppins', sans-serif;

  background:
    radial-gradient(circle at 30% 20%, rgba(120,80,255,0.10), transparent 45%),
    radial-gradient(circle at 70% 40%, rgba(0,200,255,0.08), transparent 50%),
    linear-gradient(180deg, #0f1115 0%, #141821 100%);

  color: white;
  overflow:hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, rgba(22,199,132,0.05), transparent 65%);
  pointer-events: none;
}
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 40px;

  /* 🔥 BACK TO PREMIUM DARK */
  background: rgba(20,24,33,0.75);
  backdrop-filter: blur(14px);

  border-bottom: 1px solid rgba(255,255,255,0.08);

  position: sticky;
  top: 0;
  z-index: 1000;

  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* LEFT + RIGHT */
.nav-left, .nav-right {
  display:flex;
  align-items:center;
  gap:10px;
}

/* CENTER */
.nav-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

/* LOGO (black like dashboard) */
.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 44px;
  letter-spacing: 8px;
  font-weight: 600;
  color: white;
}

/* BUTTON (MATCH DASHBOARD EXACTLY) */
.icon-btn{
  display:flex;
  align-items:center;
  justify-content:center;

  width:38px;
  height:38px;

  border-radius:50%;
  border:none;

  background: rgba(255,255,255,0.08); /* 🔥 dark glass */
  cursor:pointer;
  transition:0.25s ease;
}

/* ICON */
.icon-btn svg {
  width:20px;
  height:20px;
  stroke:white;
  transition:0.25s;
}

/* HOVER = premium glow */
.icon-btn:hover{
  background: linear-gradient(135deg,#16c784,#3aa0ff);
  box-shadow: 0 0 15px rgba(22,199,132,0.4);
}

.icon-btn:hover svg{
  stroke:white;
}
#map{
  height:100vh;
  width:100%;
  filter:saturate(1.1) contrast(1.05);
}
/* TOP BAR */
.topbar{
  position:absolute;
  top:0;
  left:0;
  right:0;
  z-index:1000;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:14px 22px;

  background:linear-gradient(
    90deg,
    rgba(0,0,0,0.65),
    rgba(22,199,132,0.15),
    rgba(58,160,255,0.12)
  );

  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  color:white;
}

/* TITLE */
.topbar h2{
  margin:0;
  font-size:16px;
  letter-spacing:1px;
}

/* STATUS CHIP */
.status{
  font-size:12px;
  padding:6px 10px;
  border-radius:20px;
  background:rgba(22,199,132,0.15);
  border:1px solid rgba(22,199,132,0.4);
  color:#bfffe7;
}

/* FLOAT PANEL */
.panel{
  position:absolute;
  bottom:24px;
  left:24px;
  z-index:1000;

  width:300px;

  padding:18px;
  border-radius:22px;

  /* GLASS BASE (darker so it separates from bg) */
  background: rgba(15,20,35,0.75);
  backdrop-filter: blur(18px);

  border:1px solid rgba(255,255,255,0.08);

  /* DEPTH + GLOW */
  box-shadow:
    0 25px 60px rgba(0,0,0,0.7),
    0 0 30px rgba(22,199,132,0.12),
    0 0 50px rgba(0,194,255,0.08);

  color:white;
  overflow:hidden;
}
.panel::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:2px;

  background:linear-gradient(90deg,#16c784,#3aa0ff);
  opacity:0.9;
}
.panel::after{
  content:"";
  position:absolute;
  inset:0;

  background:
    radial-gradient(circle at 20% 30%, rgba(22,199,132,0.15), transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(0,194,255,0.12), transparent 55%);

  opacity:0.7;
  pointer-events:none;
}
.panel h3{
  font-size:14px;
  font-weight:600;
  color:#ffffff;
}

.panel p:first-of-type{
  color:#d1d5db;
  font-weight:500;
}

.panel p:last-of-type{
  color:#16c784;
  opacity:0.9;
}
.panel p{
  margin:2px 0;
  font-size:12px;
  opacity:0.75;
}
.panel > *{
  position:relative;
  z-index:1;
}
.panel-header{
  margin-bottom:12px;
  padding-bottom:10px;

  border-bottom:1px solid rgba(255,255,255,0.06);
}
.panel-header h3{
  margin:0;
  font-size:15px;
  font-weight:600;
  letter-spacing:0.4px;
}

.panel-sub{
  font-size:12px;
  color:rgba(255,255,255,0.6);
  margin-top:4px;
}

.leaflet-popup-tip{
  background:rgba(15,20,35,0.95);
}
.leaflet-pane,
.leaflet-top,
.leaflet-bottom{
  z-index:400 !important;
}
.leaflet-popup-content-wrapper{
  background: rgba(20,24,33,0.9);
  backdrop-filter: blur(14px);
   
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.08);

  color:white;

  box-shadow:
    0 20px 40px rgba(0,0,0,0.6),
    0 0 25px rgba(22,199,132,0.12);
}
.leaflet-popup-content-wrapper:hover{
  box-shadow:
    0 25px 50px rgba(0,0,0,0.7),
    0 0 35px rgba(22,199,132,0.18);
}

.leaflet-popup-tip{
  background: rgba(20,24,33,0.9);
}
.leaflet-popup-content{
  margin: 10px 12px !important;
}
/* MARKER ANIMATION (pulse effect via CSS) */
.pulse{
  width:14px;
  height:14px;
  border-radius:50%;
  animation:pulse 1.8s infinite;
}

/* COLORS */
.pulse.green{
  background:#16c784;
  box-shadow:0 0 0 rgba(22,199,132,0.6);
}

.pulse.red{
  background:#ff4d4d;
  box-shadow:0 0 0 rgba(255,77,77,0.6);
}

.pulse.yellow{
  background:#ffc107;
  box-shadow:0 0 0 rgba(255,193,7,0.6);
}

@keyframes pulse{
  0%{
    transform: scale(1);
    box-shadow:0 0 0 0 currentColor;
  }
  70%{
    transform: scale(1.4);
    box-shadow:0 0 0 18px rgba(0,0,0,0);
  }
  100%{
    transform: scale(1);
    box-shadow:0 0 0 0 rgba(0,0,0,0);
  }
}
.directions-btn{
  display:flex;
  width:100%;
  box-sizing:border-box;
  align-items:center;
  justify-content:center;

  gap:8px;
  width:100%;

  padding:10px 14px;
  border-radius:14px;

  background:linear-gradient(135deg,#16c784,#3aa0ff);
  color:white;

  font-size:12px;
  font-weight:600;
  letter-spacing:0.3px;
  text-decoration:none;

  border:1px solid rgba(255,255,255,0.15);

  box-shadow:
    0 8px 25px rgba(22,199,132,0.25),
    inset 0 0 8px rgba(255,255,255,0.08);

  backdrop-filter: blur(6px);

  transition: all 0.25s ease;
}

/* HOVER = premium feel */
.directions-btn:hover{
  transform:translateY(-2px) scale(1.02);

  box-shadow:
    0 12px 30px rgba(22,199,132,0.35),
    0 0 20px rgba(58,160,255,0.25);
}

/* CLICK FEEDBACK */
.directions-btn:active{
  transform:scale(0.98);
}
.directions-btn svg{
  width:16px;
  height:16px;
}
.clock-card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:14px;
}

.clock-left{
  display:flex;
  flex-direction:column;
}
.digital-time{
  font-size:26px;
  font-weight:700;
  letter-spacing:1px;
}

.location{
  font-size:13px;
  opacity:0.7;
}

.extra{
  font-size:11px;
  opacity:0.5;
}

/* ANALOG CLOCK */
.clock{
  position:relative;
  width:70px;
  height:70px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.2);
   box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
}

.hand{
  position:absolute;
  bottom:50%;
  left:50%;
  transform-origin:bottom;
  transform:translateX(-50%) rotate(0deg);
}

.hour{
  width:3px;
  height:16px;
  background:white;
}

.minute{
  width:2px;
  height:22px;
  background:white;
}

.second{
  width:1px;
  height:26px;
  background:#ff4d4d;
}

/* center dot */
.clock::after{
  content:"";
  position:absolute;
  width:5px;
  height:5px;
  background:white;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}
@keyframes glowMove{
  0%{transform:translate(0,0);}
  50%{transform:translate(10px,-10px);}
  100%{transform:translate(0,0);}
}

</style>

</head>

<body>
<div class="nav">

  <!-- LEFT -->
  <div class="nav-left">
    <button class="icon-btn" onclick="back()" title="Back">
      <i data-lucide="arrow-left"></i>
    </button>
  </div>

  <!-- CENTER -->
  <div class="nav-center logo">
    ZEVL
  </div>

  <!-- RIGHT -->
  <div class="nav-right">

    <!-- 🗺️ GO TO DASHBOARD -->
    <button class="icon-btn" onclick="goDashboard()" title="Dashboard">
      <i data-lucide="home"></i>
    </button>

    <!-- 🌍 COMMUNITY -->
    <button class="icon-btn" onclick="goCommunity()" title="Community">
      <i data-lucide="globe"></i>
    </button>

  </div>

</div>

<div id="map"></div>

<div class="panel">

  <div class="panel-header">
    <h3>⚡ Network Overview</h3>
    <div class="panel-sub">3 verified stations • Network expanding</div>
  </div>

  <div class="clock-card">

    <div class="clock-left">
      <div id="digitalTime" class="digital-time">--:--</div>
      <div class="location">Lusaka, Zambia</div>
      <div id="extraInfo" class="extra">Live local time</div>
    </div>

    <div class="clock-right">
      <div class="clock">
        <div class="hand hour"></div>
        <div class="hand minute"></div>
        <div class="hand second"></div>
      </div>
    </div>

  </div>

</div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([-13.1339,27.8493],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:''
}).addTo(map);

map.on('popupopen', function () {
  lucide.createIcons();
});

async function load(){
try{
  const res = await fetch("/api/stations");
  const data = await res.json();

  data.forEach(s=>{
    // TEMP demo data (you can later move this to backend)
const statusOptions = ["available", "occupied", "unknown"];
const speedOptions = ["fast", "standard"];

const status = statusOptions[Math.floor(Math.random()*3)];
const speed = speedOptions[Math.floor(Math.random()*2)];
const lastChecked = Math.floor(Math.random()*10) + " min ago";

  let colorClass = "yellow";

if(status === "available") colorClass = "green";
if(status === "occupied") colorClass = "red";

const icon = L.divIcon({
  className: '',
  html: `<div class="pulse ${colorClass}"></div>`,
  iconSize: [14,14]
});

    L.marker([s.latitude, s.longitude], {icon})
.addTo(map)
.bindPopup(`
<div style="font-family:Poppins,sans-serif; min-width:220px; padding:2px 2px;">

    <div style="font-weight:600; font-size:15px; margin-bottom:8px;">
      ${s.name}
    </div>

    <div style="
      font-size:12px;
      margin-bottom:6px;
      font-weight:600;
      color:${
        status === "available" ? "#16c784" :
        status === "occupied" ? "#ff4d4d" :
        "#ffc107"
      };
    ">
      ${
        status === "available" ? "🟢 Available now" :
        status === "occupied" ? "🔴 In Use" :
        "🟡 Status unknown"
      }
    </div>

    <div style="font-size:12px; opacity:0.8; margin-bottom:4px;">
      ⚡ ${speed === "fast" ? "Fast Charger" : "Standard Charger"}
    </div>

    <div style="font-size:11px; opacity:0.5; margin-bottom:12px;">
      ⏱ Last checked: ${lastChecked}
    </div>

    <a href="https://www.google.com/maps/dir/?api=1&destination=${s.latitude},${s.longitude}"
       target="_blank"
       class="directions-btn">
       <i data-lucide="navigation"></i>
       Navigate
    </a>

  </div>
`)
  });

}catch(err){
  alert("Failed to load stations");
}
}
function back(){
  window.history.back();
}

load();
lucide.createIcons();

function updateClockUI(){

  const now = new Date();

  const zambiaTime = new Date(
    now.toLocaleString("en-US", { timeZone: "Africa/Lusaka" })
  );

  const hours = zambiaTime.getHours();
  const minutes = zambiaTime.getMinutes();
  const seconds = zambiaTime.getSeconds();

  // DIGITAL TIME
  const formatted =
    String(hours).padStart(2,'0') + ":" +
    String(minutes).padStart(2,'0');

  document.getElementById("digitalTime").innerText = formatted;

  // EXTRA TEXT
  document.getElementById("extraInfo").innerText = "Live local time";

  // ANALOG
  const secDeg = seconds * 6;
  const minDeg = minutes * 6;
  const hourDeg = (hours % 12) * 30 + minutes * 0.5;

  document.querySelector(".second").style.transform =
    `translateX(-50%) rotate(${secDeg}deg)`;

  document.querySelector(".minute").style.transform =
    `translateX(-50%) rotate(${minDeg}deg)`;

  document.querySelector(".hour").style.transform =
    `translateX(-50%) rotate(${hourDeg}deg)`;
}

setInterval(updateClockUI, 1000);
updateClockUI();

function goDashboard(){
  window.location = "buyer-dashboard.html";
}

function goCommunity(){
  window.location = "community.html";
}

load();
lucide.createIcons();
</script>

</body>
</html>
