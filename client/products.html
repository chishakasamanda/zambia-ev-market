<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
<title>Seller Dashboard</title>

<style>

/* SAME GLOBAL FEEL */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#ffffff;
  color:#111;
}

/* NAVBAR (MATCH HOME) */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  border-bottom:1px solid #eee;
  background:white;
}

.nav h2{
  font-size:20px;
  color:#00c896;
}

/* CONTAINER */
.container{
  padding:40px;
}

/* CARD (MATCH HOMEPAGE STYLE) */
.card{
  background:rgba(255,255,255,0.95);
  padding:25px;
  border-radius:18px;
  margin-bottom:25px;

  border:1px solid rgba(0,0,0,0.05);
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

/* INPUTS */
input,textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ddd;
  outline:none;
}

input:focus, textarea:focus{
  border-color:#16c784;
}

/* DROPDOWN */
.dropbtn{
  background:#16c784;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:20px;
  cursor:pointer;
  font-weight:600;
}

.dropdown-content{
  display:none;
  margin-top:15px;
}

/* PRODUCT GRID */
.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

/* PRODUCT CARD */
.product{
  background:white;
  padding:15px;
  border-radius:16px;
  border:1px solid #eee;

  transition:0.25s ease;
}

.product:hover{
  transform:translateY(-6px);
  box-shadow:0 12px 25px rgba(0,0,0,0.08);
}

.product img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:10px;
}

/* BEST PRODUCT */
.best-product{
  display:flex;
  gap:15px;
  align-items:center;
}

.best-product img{
  width:100px;
  height:90px;
  object-fit:cover;
  border-radius:10px;
}

/* BUTTONS */
button{
  padding:8px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:6px;
  font-weight:500;
}

/* BUTTON TYPES */
.add-btn{
  background:#16c784;
  color:white;
  width:100%;
}

.edit-btn{
  background:#ffc107;
}

.delete-btn{
  background:#ff4d4d;
  color:white;
}

/* LOGOUT BUTTON */
.nav button{
  background:black;
  color:white;
  padding:8px 16px;
  border-radius:20px;
}

/* HEADINGS */
h3{
  margin-bottom:15px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<h2 id="welcome">Seller Dashboard</h2>
<button onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- ================= ADD PRODUCT DROPDOWN ================= -->
<div class="card">
<button class="dropbtn" onclick="toggleAdd()">
Add Product
</button>

<div id="addBox" class="dropdown-content">

<input id="name" placeholder="Name">
<textarea id="description" placeholder="Description"></textarea>
<input id="price" placeholder="Price">
<input id="stock" placeholder="Stock">
<input type="file" id="images" multiple>

<button class="add-btn" onclick="addProduct()">Add Product</button>

</div>
</div>

<!-- BEST PRODUCT -->
<div class="card">
<h3>🔥 Best Performing Product</h3>
<div id="bestProductBox">Loading...</div>
</div>

<!-- PRODUCTS -->
<div class="card">
<h3>Your Products</h3>

<div class="product-grid" id="list"></div>

</div>

</div>

<script>

const token = localStorage.getItem("token");
if(!token) window.location="login.html";

const name = document.getElementById("name");
const description = document.getElementById("description");
const price = document.getElementById("price");
const stock = document.getElementById("stock");
const image = document.getElementById("image");
// ================= TOGGLE ADD PRODUCT =================
function toggleAdd(){
const box = document.getElementById("addBox");
box.style.display = box.style.display === "block" ? "none" : "block";
}

// ================= USER =================
async function loadUser(){
const res=await fetch("/api/me",{headers:{Authorization:"Bearer "+token}});
const user=await res.json();
document.getElementById("welcome").innerText="👋 Welcome back, "+user.name;
}

// ================= BEST PRODUCT =================
async function loadBestProduct(){
const res=await fetch("/api/seller/best-product",{headers:{Authorization:"Bearer "+token}});
const p=await res.json();

const box=document.getElementById("bestProductBox");

if(!p || p.message){
box.innerHTML="No data yet";
return;
}

box.innerHTML=`
<div class="best-product">
<img src="${p.image_url}">
<div>
<b>${p.name}</b><br>
❤️ ${p.wishlist_count} | 🛒 ${p.cart_count}<br>
🔥 Score: ${p.score}
</div>
</div>
`;
}

async function editProduct(id){

  const name = prompt("Enter new name:");
  const description = prompt("Enter new description:");
  const price = prompt("Enter new price:");
  const stock = prompt("Enter new stock:");
  const image_url = prompt("Enter new image URL (optional):");

  if(!name || !price){
    alert("Name and price are required");
    return;
  }

  const body = {
    name,
    description,
    price,
    stock,
    image_url
  };

  const res = await fetch(`/api/my-products/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify(body)
  });

  const data = await res.json();

  if(!res.ok){
    alert(data.message || "Update failed");
    return;
  }

  loadProducts();
  loadBestProduct();
}

// ================= PRODUCTS =================
async function loadProducts(){
const res=await fetch("/api/my-products",{headers:{Authorization:"Bearer "+token}});
const data=await res.json();

const list=document.getElementById("list");
list.innerHTML="";

data.forEach(p=>{
list.innerHTML+=`
<div class="product">

<img src="${p.image_url}">

<b>${p.name}</b><br>
${p.description || ""}<br>
💰 ${p.price}<br>
📦 ${p.stock}

<button class="edit-btn" onclick="editProduct(${p.id})">Edit</button>
<button class="delete-btn" onclick="deleteProduct(${p.id})">Delete</button>

</div>
`;
});
}

// ================= ADD =================
async function addProduct(){
const fd=new FormData();

fd.append("name",name.value);
fd.append("description",description.value);
fd.append("price",price.value);
fd.append("stock",stock.value);

const files = document.getElementById("images").files;

for (let i = 0; i < files.length; i++) {
  fd.append("images", files[i]);
}

await fetch("/api/my-products",{
method:"POST",
headers:{Authorization:"Bearer "+token},
body:fd
});

loadProducts();
loadBestProduct();
}

// ================= DELETE =================
async function deleteProduct(id){

  if(!confirm("Are you sure you want to delete this product?")) return;

  try {
    const res = await fetch(`/api/my-products/${id}`, {
      method: "DELETE",
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const data = await res.json();

    if(!res.ok){
      alert(data.message || "Delete failed");
      console.log("DELETE ERROR:", data);
      return;
    }

    alert("Product deleted successfully");

    loadProducts();
    loadBestProduct();

  } catch (err) {
    console.log("NETWORK ERROR:", err);
    alert("Server not reachable");
  }
}

// ================= LOGOUT =================
function logout(){
localStorage.clear();
window.location="login.html";
}

// ================= INIT =================
loadUser();
loadProducts();
loadBestProduct();

</script>

</body>
</html>
