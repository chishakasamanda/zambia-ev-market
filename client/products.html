<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>
<title>Seller Dashboard</title>

<style>
  
.logo{
  font-family: 'Cormorant Garamond', serif;
  font-size: 44px;
  letter-spacing: 8px;
  font-weight: 600;
  color: white; /* BLACK */
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;

background:
  radial-gradient(circle at 30% 20%, rgba(120,80,255,0.14), transparent 45%),
  radial-gradient(circle at 70% 40%, rgba(0,200,255,0.12), transparent 50%),
  linear-gradient(180deg, #141821 0%, #1a1f2b 100%);

  color: #e6edf3; /* softer dark */
}
body::before {
  content: "";
  position: fixed;
  inset: 0;

  background: radial-gradient(circle at center, rgba(22,199,132,0.04), transparent 65%);
  pointer-events: none;
}


.nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;

  background: transparent;
  border-bottom: none;

  position: absolute;
  top: 10px;
  left: 0;
  width: 100%;
  z-index: 99999;
}

/* LEFT */
.nav-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* CENTER (same as buyer dashboard) */
.nav-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

/* RIGHT */
.nav-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.search-hidden {
  width: 0;
  opacity: 0;
  padding: 8px 0;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: white;

  transition: all 0.3s ease;
  overflow: hidden;
}

.search-active {
  width: 180px;
  opacity: 1;
  padding: 8px 14px;
}
.card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(12px);

  border: 1px solid rgba(255,255,255,0.08);

  border-radius: 18px;
  padding: 30px;
  margin: 80px auto;
max-width: 1100px;

  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.card > div:first-child{
  margin-bottom: 20px;
}
.compact-card{
  padding: 10px 16px;   /* smaller */
  margin: 20px auto 10px auto;    /* less vertical space */
}
.compact-card > div:first-child{
  margin-bottom: 0; /* remove extra gap */
}
.product{
  padding: 15px;
  border-radius: 16px;

  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);

  backdrop-filter: blur(10px);

  transition: all 0.3s ease;
  overflow: hidden;
}

.product:hover{
  transform: translateY(-5px);
  box-shadow: 0 15px 35px rgba(0,0,0,0.15);
}

/* IMAGE UPGRADE */
.product img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:12px;

  transition: transform 0.5s ease;
}

.product:hover img{
  transform: scale(1.08);
}

/* DROPDOWN */
.dropbtn{
  background:#16c784;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:20px;
  cursor:pointer;
  font-weight:600;
}


input, textarea, select{
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  color: white;
}

input::placeholder,
textarea::placeholder{
  color: rgba(255,255,255,0.5);
}

/* BUTTONS */
button{
  margin-top:8px;
  padding:8px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.add-btn{ background:#16c784; color:white; width:100%; }
.edit-btn{ background:#ffc107; }
.delete-btn{ background:#ff4d4d; color:white; }

/* ORDERS */
.order{
  padding:15px;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;
  margin-bottom:12px;
  background: rgba(255,255,255,0.04);
}

.empty{
  text-align:center;
  color: rgba(255,255,255,0.5);

  padding:15px;
}
.icon-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:38px;
  height:38px;
  border-radius:50%;
  border:none;

  background: rgba(255,255,255,0.08); /* FIX */
  color: white;

  cursor:pointer;
  transition:0.2s;
}

.icon-btn:hover{
  background:#111;
}
/* target the actual SVG inside the button */
.icon-btn svg {
  stroke: white; /* FIX */
  transition: 0.2s;
}

/* 🔥 force white icon on hover */
.icon-btn:hover svg {
  stroke: white !important;
}

.notif-box{
  position:absolute;
  right:0;
  top:45px;
  width:180px;
  background: rgba(20,24,33,0.95);
  border: 1px solid rgba(255,255,255,0.08);

  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);

  overflow:hidden;
  z-index:99999;

  /* 🔥 animation setup */
  opacity:0;
  transform: translateY(-10px);
  max-height:0;

  pointer-events:none;
  transition: all 0.25s ease;
}

/* ACTIVE STATE */
.notif-box.show{
  opacity:1;
  transform: translateY(0);
  max-height:300px;
  pointer-events:auto;
}
.notif-item{
  padding: 12px 14px;
  cursor: pointer;

  display: flex;
  align-items: center;
  gap: 10px;

  font-size: 14px;

  transition: 0.2s;
}

.notif-item:hover{
  background: rgba(255,255,255,0.05); /* FIX */
  transform: translateX(3px);
}
.dropdown-content{
  margin-top: 14px;

  background: rgba(20,24,33,0.95);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;

  padding: 18px;

  box-shadow: 0 20px 50px rgba(0,0,0,0.5);

  max-width: 1100px;

  /* animation */
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transform: translateY(-8px);
  transition: all 0.25s ease;
}

.dropdown-content.show{
  max-height: 500px;
  opacity: 1;
  transform: translateY(0);
}
.dropdown-content input,
.dropdown-content textarea,
.dropdown-content select{
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: white;

  border-radius: 10px;
  padding: 10px 12px;

  transition: 0.2s;
}

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  display:flex;
  justify-content:center;
  align-items:center;

  opacity:0;
  pointer-events:none;
  transition:0.25s ease;
  z-index:99999;
}

.popup.show{
  opacity:1;
  pointer-events:auto;
}

.popup-box{
   background:#141821;
  color:#fff;
  padding:25px 30px;
  border-radius:14px;
  text-align:center;
  min-width:280px;
}

.popup-box.success{
  border:1px solid #16c784;
}

.popup-box.error{
  border:1px solid #ff4d4f;
}
.product-card.hide {
  opacity: 0;
  transform: scale(0.92) translateY(10px);
  pointer-events: none;
}

.product-card.show {
  opacity: 1;
  transform: scale(1) translateY(0);
}
.product-img{
  width:100%;
  height:160px;
  border-radius:14px;
  overflow:hidden;
  position:relative;
  background:#f5f5f5;
}

button{
  font-family:'Poppins',sans-serif;
  transition: all 0.25s cubic-bezier(.2,.8,.2,1);
  transform: translateY(0);
}

/* ADD PRODUCT (PRIMARY CTA) */
.add-btn{
  grid-column: span 2;

  width: auto;              /* ❌ remove full width */
  padding: 10px 18px;

  border-radius: 10px;

  font-size: 13px;
  font-weight: 600;

  display: block;
  margin: 14px auto 0 auto;  /* ✅ center it */

  background: linear-gradient(135deg, #16c784, #0ea56b);
  color: white;

  box-shadow: 0 8px 20px rgba(22,199,132,0.25);
}

.add-btn:hover{
  transform: translateY(-2px);
  box-shadow: 0 18px 40px rgba(22,199,132,0.35);
}

.add-btn:active{
  transform: scale(0.98);
}

/* EDIT */
.edit-btn{
background: rgba(255,255,255,0.7);
  color: #d6a600;
  border: 1px solid rgba(255, 193, 7, 0.35);
}

.edit-btn:hover{
  background: #ffc107;
  color: black;
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(255,193,7,0.25);
}

/* DELETE */
.delete-btn{
  background: rgba(255, 77, 79, 0.12);
  color: #ff4d4f;
  border: 1px solid rgba(255, 77, 79, 0.35);
}

.delete-btn:hover{
  background: #ff4d4f;
  color: white;
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(255,77,79,0.25);
}

/* ALL BUTTON CLICK FEEL */
button:active{
  transform: scale(0.97);
}
/* ================= TESLA PRODUCT CARDS ================= */

.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:22px;
}

/* IMAGE WRAPPER */
.product-media{
  position:relative;
  height:180px;
  overflow:hidden;
  padding: 10px;
  border-radius: 18px;
}

.product-media img{
  width:100%;
  height:100%;
  object-fit:cover;

  border-radius:16px;

  transform: none !important;
  transition: none !important;
}
.product-card:hover .product-media img{
  transform: scale(1.03);
  border-radius: 18px;
}

/* SOFT GREEN GLOW */
.product-glow{
  display:none;
}

.product-card:hover .product-glow{
  opacity:1;
}

/* INFO SECTION */
.product-info{
  padding:14px;
}

.product-info h3{
  margin:0;
  font-size:16px;
  color:white;
  font-weight:600;
  letter-spacing:0.3px;
}

.price{
  color: #16c784;/* soft blue instead of green */

  font-weight:600;
  margin:4px 0;
}

.stock{
  font-size:13px;
  opacity:0.7;
  color: rgba(255,255,255,0.6);
}

/* ACTIONS */
.product-actions{
  display:flex;
  gap:8px;
  margin-top:10px;
}
.product-actions button{
  flex:1;
  padding:8px;
  border-radius:10px;
  font-size:12px;
}
.edit-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  width: 100%;

  z-index: 100;

   background: rgba(20,24,33,0.95);
  padding: 12px;
   border: 1px solid rgba(255,255,255,0.08);
  margin-top: 10px;

  box-shadow: 0 10px 25px rgba(0,0,0,0.15);

  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transform: translateY(-8px);
  transition: all 0.3s ease;
}

.edit-dropdown.show {
  max-height: 400px;
  opacity: 1;
  transform: translateY(0);
}
.product-card {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(10px);

  border: 1px solid rgba(255,255,255,0.08);

  border-radius: 16px;

  box-shadow: 0 10px 30px rgba(0,0,0,0.4);

  transition: 0.25s ease;
}

.product-card:hover {
  box-shadow: 0 15px 40px rgba(0,0,0,0.5),
              0 0 25px rgba(22,199,132,0.12);
}

.product-card.active{
  z-index: 9999 !important;
}
.product-grid{
  position: relative;
  z-index: 1;
}
@keyframes fadeIn {
  from {opacity:0; transform: translateY(-5px);}
  to {opacity:1; transform: translateY(0);}
}
.add-product-btn{
  position: relative;   /* 🔥 REQUIRED for ::after */
  overflow: hidden; 
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;

  width:auto;              /* 🔥 no full width */
  padding:10px 16px;       /* 🔥 reduced size */

  border:none;
  border-radius:10px;

  font-weight:600;
  font-size:13px;

  color:white;

  background: linear-gradient(135deg, #16c784, #0ea56b);

  box-shadow:
    0 6px 16px rgba(22,199,132,0.25),
    inset 0 0 0 1px rgba(255,255,255,0.08);

  cursor:pointer;
  transition: all 0.25s ease;
}

/* smaller icon */
.add-product-btn svg{
  width:16px;
  height:16px;
}

/* hover */
.add-product-btn:hover{
  transform: translateY(-1px);
  box-shadow: 0 10px 22px rgba(22,199,132,0.3);
}

/* click */
.add-product-btn:active{
  transform: scale(0.97);
}
/* OPTIONAL: subtle glow on hover */
.add-product-btn::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:14px;
  background: radial-gradient(circle at center, rgba(255,255,255,0.15), transparent 60%);
  opacity:0;
  transition:0.25s;
}

.add-product-btn:hover::after{
  opacity:1;
}
#bestList .product-card {
  border: 1px solid rgba(22,199,132,0.25);
  box-shadow: 0 10px 25px rgba(22,199,132,0.15);
}
.best-card{
  display:flex;
  gap:16px;
  align-items:center;

  background: rgba(255,255,255,0.04); /* FIX */
  border-radius:18px;
  padding:14px;

  border:1px solid rgba(255,255,255,0.08);

  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.best-card:hover{
  transform:translateY(-3px);
  box-shadow:0 15px 35px rgba(0,0,0,0.12);
}

/* IMAGE */
.best-media{
  position:relative;
  width:140px;
  height:100px;
  flex-shrink:0;

  border-radius:14px;
  overflow:hidden;
}

.best-media img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* BADGE */
.best-badge{
  position:absolute;
  top:8px;
  left:8px;

  background:#16c784;
  color:#fff;

  font-size:11px;
  padding:4px 8px;
  border-radius:10px;
}

/* INFO */
.best-info h3{
  margin:0;
  font-size:16px;
}

.best-info .price{
  color:#16c784;
  font-weight:600;
  margin:4px 0;
}

.best-info .score{
  font-size:13px;
  opacity:0.7;
}
#bestList{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.form-grid{
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}
.form-grid input,
.form-grid textarea,
.form-grid select{
  width: 100%;
  padding: 10px 12px;

  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);

  background: rgba(255,255,255,0.04);
  color: white;

  font-size: 13px;
}
#imgCount{
  display:block;
  margin: 6px 0 10px;
  color: rgba(255,255,255,0.5);
  font-size: 13px;
}
.add-bar{
  margin-top: 90px;

  display: flex;
  justify-content: flex-start;

  padding-left: 40px; /* match navbar */
}
.logout-btn {
  padding: 10px 18px;
  border-radius: 999px; /* pill shape */

  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.08);

  color: #e6edf3;
  font-size: 14px;
  font-weight: 500;

  cursor: pointer;
  backdrop-filter: blur(8px);

  transition: all 0.25s ease;
}

/* hover = same premium feel */
.logout-btn:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.4);

  transform: translateY(-1px);
  box-shadow: 0 0 15px rgba(0,140,255,0.25);
}

</style>
</head>

<body>
<div class="nav">

  <!-- LEFT -->
  <div class="nav-left">
    <button class="icon-btn" onclick="toggleSellerSearch()" title="Search My Products">
      <i data-lucide="search"></i>
    </button>

    <input id="sellerSearch" class="search-hidden" placeholder="Search your products..." oninput="filterMyProducts()">

    <button class="icon-btn" onclick="goProfile()" title="Profile">
      <i data-lucide="user"></i>
    </button>
  </div>

  <!-- CENTER -->
 <div class="nav-center logo">
  ZEVL
</div>

  <!-- RIGHT -->
  <div class="nav-right">

    <!-- NOTIFICATIONS -->
    <div style="position:relative;">
      <button class="icon-btn" onclick="toggleNotifications()" title="Notifications">
        <i data-lucide="bell"></i>
      </button>

     <div id="notifBox" class="notif-box">

  <div class="notif-item" onclick="goChats()">
    <i data-lucide="message-circle"></i>
    <span>View Chats</span>
  </div>

  <div class="notif-item" onclick="goOrders()">
    <i data-lucide="package"></i>
    <span>View Orders</span>
  </div>

</div>
</div>

    <!-- LOGOUT -->
<button class="logout-btn" onclick="logout()">Logout</button>

  </div>

</div>

<!-- ADD PRODUCT -->
<div class="add-bar">
  <button class="add-product-btn" onclick="toggleAdd()">
    <i data-lucide="plus"></i>
    <span>Add Product</span>
  </button>
</div>

<div id="addBox" class="dropdown-content">

  <div class="form-grid">
<input id="name" placeholder="Product Name">
<textarea id="description" placeholder="Description"></textarea>
<input id="price" type="number" placeholder="Price">

  <option value="battery">Battery</option>

</select>
  <button class="add-btn" onclick="addProduct()">Add Product</button>
</div>
</div>
</div>
</div>
<div class="card">
  <h3>🔥 Best Performing Product</h3>
  <div id="bestList"></div>
</div>

<div class="card">
<h3>Your Products</h3>
<div class="product-grid" id="list"></div>
</div>

</div>

<script>

const token = localStorage.getItem("token");

if(!token){
showPopup("Session Expired", "Please login again", "error");
  window.location = "login.html";
}
// ================= USER =================
async function loadUser(){
  try{
    const res = await fetch("/api/me",{headers:{Authorization:"Bearer "+token}});
    const user = await res.json();

    console.log("USER:", user); // debug only

  }catch(err){
    console.log("User load failed");
  }
}

// ================= TOGGLE ADD =================
function toggleAdd(){
  const box = document.getElementById("addBox");

  if(box.classList.contains("show")){
    box.classList.remove("show");
    setTimeout(()=> box.style.display = "none", 300);
  } else {
    box.style.display = "block";
    setTimeout(()=> box.classList.add("show"), 10);
  }
}
//search
function toggleSellerSearch(){
  document.getElementById("sellerSearch").classList.toggle("search-active");
}

function filterMyProducts(){
  const q = document.getElementById("sellerSearch").value.toLowerCase();
  const cards = document.querySelectorAll("#list .product-card"); // ✅ FIXED

  cards.forEach(card=>{
    const text = card.innerText.toLowerCase();

    if(text.includes(q)){
      card.classList.remove("hide");
      card.classList.add("show");
    } else {
      card.classList.add("hide");
      card.classList.remove("show");
    }
  });
}

function goProfile(){
  window.location = "/seller-profile.html";
}

function toggleNotifications(){
  document.getElementById("notifBox").classList.toggle("show");
}

// go to chat page (you already use seller_name system)
function goChats(){
  window.location = "/chat-inbox.html"; // change if your page name differs
}

// close dropdown when clicking outside
document.addEventListener("click", function(e){
  const box = document.getElementById("notifBox");
  const bell = e.target.closest(".icon-btn");
  const notif = e.target.closest("#notifBox");

 if(!bell && !notif){
    box.classList.remove("show");
  }
});

function toggleEdit(id){

  const box = document.getElementById("edit-" + id);
  if(!box) return;

  const card = box.closest(".product-card");
  if(!card) return;

  const isOpen = box.classList.contains("show");

  document.querySelectorAll(".edit-dropdown").forEach(el=>{
    el.classList.remove("show");
  });

  document.querySelectorAll(".product-card").forEach(c=>{
    c.classList.remove("active");
  });

  if(!isOpen){
    box.classList.add("show");
    card.classList.add("active");
  }
}

// ================= PRODUCTS =================
async function loadProducts(){
  try{

    const res = await fetch("/api/my-products", {
      headers:{Authorization:"Bearer "+token},
      cache:"no-store"
    });
    const data = await res.json();

    const list = document.getElementById("list");

    list.innerHTML = ""; // clean DOM

    const unique = new Map();
    data.forEach(p => {
      if(!unique.has(p.id)){
        unique.set(p.id, p);
      }
    });

const fragment = document.createDocumentFragment();

unique.forEach(p => {
  const div = document.createElement("div");
  div.className = "product-card show";

  div.innerHTML = `
    <div class="product-media">
      <img loading="lazy" src="${(p.images && p.images[0]) || p.image_url || '/Images/placeholder.jpg'}">
      <div class="product-glow"></div>
    </div>

    <div class="product-info">
      <h3>${p.name || "Unnamed Product"}</h3>
      <p class="price">ZMW ${p.price ?? 0}</p>
      <p class="stock">Stock: ${p.stock}</p>

      <div class="product-actions">
        <button class="edit-btn" onclick="toggleEdit(${p.id})">Edit</button>
        <button class="delete-btn" onclick="deleteProduct(${p.id})">Delete</button>
      </div>
    </div>

    <div id="edit-${p.id}" class="edit-dropdown">
      <input id="edit-name-${p.id}" value="${p.name}">
      <input id="edit-price-${p.id}" value="${p.price}">
      <input id="edit-stock-${p.id}" value="${p.stock}">
      <input type="file" id="edit-image-${p.id}">
      <button onclick="saveEdit(${p.id})" class="add-btn">Save</button>
    </div>
  `;

  fragment.appendChild(div);
});

list.appendChild(fragment);


  }catch(err){
    console.error("LOAD PRODUCTS ERROR:", err);
    document.getElementById("list").innerHTML =

// ================= DELETE =================
async function deleteProduct(id){

  const res = await fetch(`/api/products/${id}`,{
    method:"DELETE",
    headers:{Authorization:"Bearer "+token}
  });

  if(!res.ok){
    showPopup("Error","Delete failed","error");

  showPopup("Deleted","Product removed","success");

  // small delay so popup shows properly
  setTimeout(() => {
    loadProducts();
  }, 300);
}
// ================= EDIT =================
async function saveEdit(id){

  const fd = new FormData();

  fd.append("name", document.getElementById(`edit-name-${id}`).value);
  fd.append("price", document.getElementById(`edit-price-${id}`).value);
  fd.append("stock", document.getElementById(`edit-stock-${id}`).value);

  const file = document.getElementById(`edit-image-${id}`).files[0];
  if(file) fd.append("image", file);

  const res = await fetch(`/api/products/${id}`,{
    method:"PUT",
    headers:{ Authorization:"Bearer "+token },
    body: fd
  });

  if(!res.ok){
    showPopup("Error","Update failed","error");
    return;
  }

  showPopup("Updated","Product updated","success");

  // ✅ IMPORTANT: wait properly, then reload
  await loadProducts();
}

function showPopup(title, msg, type) {
  const popup = document.getElementById("popup");
  const box = popup.querySelector(".popup-box");

  document.getElementById("popup-title").innerText = title;
  document.getElementById("popup-msg").innerText = msg;

  box.classList.remove("success", "error");
  if (type) box.classList.add(type);

  popup.classList.add("show");

  setTimeout(() => {
    popup.classList.remove("show");
  }, 2000);
}
