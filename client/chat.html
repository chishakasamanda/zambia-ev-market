<!DOCTYPE html>
<html>
<head>
<title>Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>

:root{
  --ev-green:#16c784;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;

  background:
    radial-gradient(circle at 30% 20%, rgba(120,80,255,0.10), transparent 45%),
    radial-gradient(circle at 70% 40%, rgba(0,200,255,0.08), transparent 50%),
    linear-gradient(180deg, #0f1115 0%, #141821 100%);

  color:white;
}

body::before {
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at center, rgba(22,199,132,0.05), transparent 65%);
  pointer-events:none;
}
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;

  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(12px);

  border-bottom: 1px solid rgba(255,255,255,0.08);

  position: sticky;
  top: 0;
  z-index: 9999;
}
/* LEFT / RIGHT */
.nav-left, .nav-right{
  display:flex;
  align-items:center;
  gap:10px;
}

/* CENTER */
.nav-center{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-weight:600;
}

.icon-btn{
  width:38px;
  height:38px;
  min-width:38px;
  min-height:38px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:50%;
  border:none;

  background:#f5f5f5; /* 🔥 change from glass to solid */

  cursor:pointer;
  transition:0.2s;

  flex-shrink:0;
}

.icon-btn svg{
  width:18px !important;
  height:18px !important;
  stroke:#111;   /* 🔥 black icons like inbox */
  stroke-width:2;
}

.icon-btn:hover{
  background:#111;
}

.icon-btn:hover svg{
  stroke:white;
}
/* CONTAINER */
.container{
  max-width:700px;
  margin:30px auto;
  padding:20px;
}

.chat-box{
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(14px);

  border-radius:20px;
  padding:20px;

  border:1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 20px 50px rgba(0,0,0,0.5);

  display:flex;
  flex-direction:column;

  height:520px;
}
/* MESSAGES AREA */
#messages{
  flex:1;
  overflow-y:auto;
  padding-right:10px;
  margin-bottom:15px;
}

/* MESSAGE BUBBLES */
.msg{
  max-width:70%;
  padding:10px 14px;
  border-radius:16px;
  margin:8px 0;

  font-size:14px;
  line-height:1.4;

  opacity:0;
  transform: translateY(8px) scale(0.96);

  transition: all 0.25s ease;
}

/* show animation */
.msg.show{
  opacity:1;
  transform: translateY(0) scale(1);
}

/* YOU */
.me{
  background: linear-gradient(135deg,#16c784,#00c2ff);
  color:white;
  margin-left:auto;
  border-bottom-right-radius:6px;

  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

.other{
  background: rgba(255,255,255,0.08);  /* darker glass */
  color: white;
  margin-right:auto;
  border-bottom-left-radius:6px;
}

/* INPUT AREA */
.input-area{
  display:flex;
  gap:10px;
}

/* input */
#msgInput{
  flex:1;
  padding:12px 14px;

  border-radius:25px;

  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);

  color:white;
  outline:none;
}

#msgInput::placeholder{
  color: rgba(255,255,255,0.5);
}

#msgInput:focus{
  border-color:#16c784;
  box-shadow:0 0 0 2px rgba(22,199,132,0.15);
}
/* INPUT */
#msgInput{
  flex:1;
  padding:12px;
  border-radius:25px;
  border:1px solid #ddd;
  outline:none;
  font-family:'Poppins',sans-serif;
}

#msgInput:focus{
  border-color:var(--ev-green);
  box-shadow:0 0 0 2px rgba(22,199,132,0.1);
}
#productContext{
  margin-bottom:10px;
  padding:10px 12px;
color: #000;
  border-radius:12px;

  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);

  font-size:13px;
}
/* BUTTON */
.send-btn{
  padding:12px 16px;

  border:none;
  border-radius:25px;

  background: linear-gradient(135deg,#16c784,#00c2ff);

  color:white;
  font-weight:600;
  cursor:pointer;

  transition:0.25s;
}

.send-btn:hover{
  transform: translateY(-2px);
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<div class="nav">

  <div class="nav-left">
    <button class="icon-btn" onclick="goBack()" title="Back">
      <i data-lucide="arrow-left"></i>
    </button>
  </div>

  <div class="nav-center" id="chatTitle">💬 Chat</div>

  <div class="nav-right"></div>

</div>

<div class="container">

<div class="chat-box">

<div id="productContext">
  <b>📦 Product:</b> General Chat
</div>

  <div id="messages">Loading...</div>

  <div class="input-area">
    <input id="msgInput" placeholder="Type a message..." />
    
    <button class="send-btn" onclick="sendMessage()">Send</button>
    <input type="file" id="imageInput" accept="image/*" style="display:none" />
<button class="send-btn" onclick="document.getElementById('imageInput').click()">
 <i data-lucide="image"></i>
</button>

  </div>

</div>

</div>

<script>

const token = localStorage.getItem("token");

const sellerId =
  new URLSearchParams(window.location.search).get("seller_id") ||
  new URLSearchParams(window.location.search).get("buyer_id");
const sellerName =
  new URLSearchParams(window.location.search).get("seller_name") ||
  new URLSearchParams(window.location.search).get("buyer_name");

const productId = new URLSearchParams(window.location.search).get("product_id") || null;
const productName = new URLSearchParams(window.location.search).get("product_name") || "General Chat";

let lastLoaded = "";

if (productName) {
  document.getElementById("productContext").innerHTML =
    `<b>📦 Product:</b> ${productName}`;
}

if(sellerName){
  document.getElementById("chatTitle").innerText =
    "💬 Chat with " + sellerName;
}
async function loadMessages(){

  const res = await fetch("/api/messages/"+sellerId,{
    headers:{ Authorization:"Bearer "+token }
  });

  const data = await res.json();
  if(data.length === 0){
  const box = document.getElementById("messages");
  box.innerHTML = "<p style='text-align:center;color:#888'>No messages yet</p>";
  return;
}

const newData = JSON.stringify(data);

if(newData === lastLoaded) return;
lastLoaded = newData;

const box = document.getElementById("messages");
box.innerHTML = "";

const userId = JSON.parse(atob(token.split('.')[1])).id;

data.forEach((m, index) => {

  const isMe = m.sender_id == userId;

  const div = document.createElement("div");
  div.className = `msg ${isMe ? 'me' : 'other'}`;

  div.innerHTML = `
    ${m.product_name ? `
      <div style="font-size:11px;color:#16c784;margin-bottom:4px;">
        📦 ${m.product_name}
      </div>
    ` : ""}

    ${m.image_url ? `
      <img src="${m.image_url}" style="max-width:200px;border-radius:10px;" />
    ` : ""}

    ${m.message ? `<div>${m.message}</div>` : ""}

    <div style="font-size:10px;opacity:0.5;margin-top:4px;">
      ${new Date(m.created_at).toLocaleTimeString()}
    </div>
  `;

  box.appendChild(div);

  setTimeout(() => {
    div.classList.add("show");
  }, index * 40);
});
}
function sendMessage(){

  const msg = document.getElementById("msgInput").value;

  if(!msg.trim()) return;

  console.log("DEBUG SEND =>", {
    receiver_id: sellerId,
    message: msg,
    product_id: productId
  });

  fetch("/api/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body: JSON.stringify({
      receiver_id: sellerId,
      message: msg,
      product_id: productId
    })
  });

  document.getElementById("msgInput").value="";
  loadMessages();
}

// auto refresh (feels real-time)
setInterval(loadMessages, 2000);

loadMessages();

document.getElementById("imageInput").addEventListener("change", async function () {

  const file = this.files[0];
  if (!file) return;

  if (!sellerId) {
    alert("Chat user not found. Cannot send image.");
    return;
  }

  const formData = new FormData();
  formData.append("image", file);
  formData.append("receiver_id", sellerId);
formData.append("product_id", productId || null);

  const res = await fetch("/api/messages/image", {
    method: "POST",
    headers: {
      Authorization: "Bearer " + token
    },
    body: formData
  });

  const data = await res.json();
  console.log("IMAGE UPLOADED:", data);

  this.value = "";
  loadMessages();
});

function goBack(){
  window.history.back();
}

lucide.createIcons();

</script>

</body>
</html>
