<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>
<title>Profile</title>

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:
    radial-gradient(circle at 20% 20%, #f8fafc 0%, transparent 50%),
    radial-gradient(circle at 80% 30%, #eef2f6 0%, transparent 55%),
    linear-gradient(180deg, #ffffff 0%, #f3f5f7 50%, #e9edf2 100%);
}

.card{
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  padding:30px;
  border-radius:18px;
  width:350px;
  display:flex;
  flex-direction:column;
  gap:12px;
  border:1px solid rgba(0,0,0,0.06);
  box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

h2{
  text-align:center;
}

input{
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
}

input:disabled{
  background:#f5f5f5;
  color:#777;
}

button{
  padding:12px;
  border-radius:10px;
  border:none;
  font-weight:600;
  cursor:pointer;
  transition:0.25s ease;
}

.save-btn{
  background:#16c784;
  color:white;
}

.edit-btn{
  background:#111;
  color:white;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 18px rgba(0,0,0,0.1);
}

#msg{
  text-align:center;
  font-size:14px;
}

.small-note{
  font-size:12px;
  color:#666;
  text-align:center;
}
.back-btn{
  position: fixed;
  top: 20px;
  left: 20px;

  width: 44px;
  height: 44px;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 50%;
  border: none;

  background: #111;
  color: white;

  cursor: pointer;

  box-shadow: 0 8px 20px rgba(253, 253, 253, 0.15);
  transition: 0.2s ease;
}

.back-btn:hover{
  transform: translateY(-3px);
  background: #e2dddd;
}

/* ICON SIZE FIX */
.back-btn i{
  width: 22px;
  height: 22px;
  stroke-width: 2.2;
}
</style>
</head>

<body>

<!-- BACK BUTTON (TOP LEFT) -->
<button class="back-btn icon-only" onclick="back()" title="Back">
  <i data-lucide="arrow-left"></i>
</button>

<div class="card">

<h2>Profile</h2>

<input id="name" placeholder="Name" disabled>
<input id="phone" placeholder="Phone (+260...)" disabled>
<input id="address" placeholder="Zambia Address" disabled>
<input id="email" placeholder="Email" disabled>

<button id="editBtn" class="edit-btn" onclick="toggleEdit()">Edit Profile</button>
<button class="save-btn" onclick="save()">Save Changes</button>

<p id="msg"></p>
<p class="small-note">Phone must be Zambian format (+260 or 0XXXXXXXXX)</p>

</div>

<script>

const token = localStorage.getItem("token");
if(!token) window.location="login.html";

let editMode = false;

// ================= LOAD =================
async function load(){
try{
const res = await fetch("/api/me",{
  headers:{Authorization:"Bearer "+token}
});

const user = await res.json();

// fill fields
document.getElementById("name").value = user.name || "";
document.getElementById("email").value = user.email || "";

// fallback saved
const saved = JSON.parse(localStorage.getItem("profile")) || {};

document.getElementById("phone").value = saved.phone || user.phone || "";
document.getElementById("address").value = saved.address || user.address || "";

}catch(err){
document.getElementById("msg").innerText="Failed to load profile";
}
}

// ================= TOGGLE EDIT =================
function toggleEdit(){

editMode = !editMode;

document.querySelectorAll("input").forEach(i=>{
  if(i.id !== "email"){
    i.disabled = !editMode;
  }
});

document.getElementById("editBtn").innerText =
editMode ? "Cancel Edit" : "Edit Profile";
}

// ================= VALIDATION =================
function isZambianPhone(phone){
  return /^(\\+260|0)[0-9]{9}$/.test(phone);
}
function isZambianAddress(address){

  const clean = address.toLowerCase();

  if(clean.length < 8) return false;

  const zambiaKeywords = [
    "zambia",
    "lusaka",
    "kitwe",
    "ndola",
    "livingstone",
    "chipata",
    "kabwe",
    "mufulira",
    "choma",
    "solwezi",
    "mazabuka"
  ];

  const hasLocation = zambiaKeywords.some(city => clean.includes(city));

  const hasStructure =
    clean.includes("street") ||
    clean.includes("road") ||
    clean.includes("avenue") ||
    clean.includes("rd") ||
    clean.includes("ave") ||
    clean.includes("plot") ||
    clean.includes(",");

  return hasLocation || hasStructure;
}

// ================= SAVE =================
function save(){

const name = document.getElementById("name").value.trim();
const phone = document.getElementById("phone").value.trim();
const address = document.getElementById("address").value.trim();

if(!name || !phone || !address){
showMsg("All fields are required", "red");
return;
}

if(!isZambianPhone(phone)){
showMsg("Invalid Zambian phone number", "red");
return;
}

if(!isZambianAddress(address)){
  showMsg("Please enter a valid Zambian address", "red");
  return;
}

const profile = { name, phone, address };

localStorage.setItem("profile", JSON.stringify(profile));

showMsg("Profile updated successfully", "#16c784");

toggleEdit();
}

// ================= MSG =================
function showMsg(text, color){
const msg = document.getElementById("msg");
msg.style.color = color;
msg.innerText = text;
}

// BACK
function back(){
window.location="buyer-dashboard.html";
}

load();
setTimeout(() => {
  lucide.createIcons();
}, 0);
</script>

</body>
</html>
