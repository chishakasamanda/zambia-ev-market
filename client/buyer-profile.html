<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
<title>Profile</title>

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;

  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;

  /* SAME BACKGROUND AS HOMEPAGE */
  background:
    radial-gradient(circle at 20% 20%, #f8fafc 0%, transparent 50%),
    radial-gradient(circle at 80% 30%, #eef2f6 0%, transparent 55%),
    linear-gradient(180deg, #ffffff 0%, #f3f5f7 50%, #e9edf2 100%);
}

/* CARD (matches login + homepage feel) */
.card{
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  padding:30px;
  border-radius:18px;
  width:350px;

  display:flex;
  flex-direction:column;
  gap:12px;

  border:1px solid rgba(0,0,0,0.06);
  box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

/* TITLE */
.card h2{
  text-align:center;
  margin-bottom:10px;
  color:#111;
}
.card:hover{
  transform:translateY(-5px);
}

/* INPUTS */
input{
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
}

/* BUTTONS */
button{
  padding:12px;
  border-radius:10px;
  border:none;
  font-weight:600;
  cursor:pointer;
  transition:0.25s ease;
}

/* SAVE */
button:first-of-type{
  background:#16c784;
  color:white;
}

/* BACK */
button:last-of-type{
  background:#111;
  color:white;
}

/* HOVER (same smooth feel as homepage cards) */
button:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 18px rgba(0,0,0,0.1);
}

#msg{
  text-align:center;
  color:#16c784;
  font-size:14px;
}
</style>
</head>

<body>

<div class="card">

<h2>Profile</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" disabled>

<button onclick="save()">Save</button>
<button onclick="back()">Back</button>

<p id="msg"></p>

</div>

<script>

const token = localStorage.getItem("token");
if(!token) window.location="login.html";

// LOAD
async function load(){
try{
const res = await fetch("/api/me",{headers:{Authorization:"Bearer "+token}});
const user = await res.json();

document.getElementById("name").value = user.name || "";
document.getElementById("email").value = user.email || "";

}catch{
alert("Failed to load profile");
}
}

// SAVE (optional backend support)
async function save(){
document.getElementById("msg").innerText = "Saved (backend optional)";
}

function back(){
window.location="buyer-dashboard.html";
}

load();

</script>

</body>
</html>
