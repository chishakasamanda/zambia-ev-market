<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>
<title>Profile</title>

<style>
  body{
  margin:0;
  font-family:'Poppins',sans-serif;

  background:
    radial-gradient(circle at 30% 20%, rgba(120,80,255,0.10), transparent 45%),
    radial-gradient(circle at 70% 40%, rgba(0,200,255,0.08), transparent 50%),
    linear-gradient(180deg, #0f1115 0%, #141821 100%);

  color:white;
}
  
.logo{
  font-family: 'Cormorant Garamond', serif;
  font-size: 40px;
  letter-spacing: 6px;
  font-weight: 600;
  color:white;
}

.logo:hover{
  opacity:0.7;
}
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;

  background: rgba(20,24,33,0.85);
  backdrop-filter: blur(10px);

  border-bottom: 1px solid rgba(255,255,255,0.05);

  position:sticky;
  top:0;
  z-index:9999;
}

.nav-left,
.nav-right{
  width:120px; /* balances center */
  display:flex;
  align-items:center;
}

.nav-center{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-weight:700;
}

.profile-wrapper{
  max-width:900px;
  margin:40px auto;
  padding:20px;
}

.profile-header{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:30px;
  
}

.avatar{
  width:60px;
  height:60px;
  border-radius:50%;

  background: linear-gradient(135deg,#16c784,#00c2ff);

  display:flex;
  align-items:center;
  justify-content:center;

  font-weight:600;
  color:white;
}

.profile-header h2{
  margin:0;
  font-size:20px;
}

.profile-header p{
  margin:2px 0 0;
 color: rgba(255,255,255,0.6);
  font-size:13px;
}

/* STATS */
.profile-stats{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:16px;
  margin-bottom:30px;
}

.stat-card{
  background: rgba(255,255,255,0.03);
  padding:20px;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:8px;

  transition:0.2s;
}

.stat-card i{
  background:#f3f4f6;
  padding:8px;
  border-radius:10px;
}

.stat-card h3{
  margin:0;
  font-size:20px;
}

.stat-card p{
  margin:0;
  font-size:13px;
  color: rgba(255,255,255,0.6);
}
.section{
  margin-bottom:30px;
}

.section h3{
  margin-bottom:10px;
  font-size:16px;
  color: rgba(255,255,255,0.6);
}
/* FORM CARD */
.card{
 background: rgba(255,255,255,0.03);
 backdrop-filter: blur(12px);
  padding:25px;
   border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
   color:white;
}

h2{
  text-align:center;
}

input{
  padding:12px;
  border-radius:10px;

  border:1px solid rgba(255,255,255,0.1);

  background: rgba(255,255,255,0.05);
  color:white;
  font-size:14px;
}

input:disabled{
  background: rgba(255,255,255,0.03);
  color: rgba(255,255,255,0.5);
}

button{
  padding:12px;
  border-radius:10px;
  border:none;
  font-weight:600;
  cursor:pointer;
  transition:0.25s ease;
}

.save-btn{
  background:linear-gradient(135deg,#16c784,#00c2ff);
  color:white;
}

.edit-btn{
  background: rgba(255,255,255,0.08);
  color:white;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(22,199,132,0.2);
}

#msg{
  text-align:center;
  font-size:14px;
}

.small-note{
  font-size:12px;
 color: rgba(255,255,255,0.6);
  text-align:center;
}
.back-btn{
  position: fixed;
  top: 20px;
  left: 20px;

  width: 44px;
  height: 44px;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 50%;
  border: none;

  background: #111;
  color: white;

  cursor: pointer;

  box-shadow: 0 8px 20px rgba(253, 253, 253, 0.15);
  transition: 0.2s ease;
}

.back-btn:hover{
  transform: translateY(-3px);
  background: #e2dddd;
}

/* ICON SIZE FIX */
.back-btn i{
  width: 22px;
  height: 22px;
  stroke-width: 2.2;
}
.list{
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(12px);

  border-radius:16px;
  border:1px solid rgba(255,255,255,0.08);

  overflow:hidden;
}

.list div{
  display:flex;
  align-items:center;
  gap:10px;

  padding:16px;
  cursor:pointer;

  border-bottom:1px solid rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.85);

  transition:0.2s;
}

.list div:last-child{
  border-bottom:none;
}

.list div:hover{
  background: rgba(255,255,255,0.05);
}
.list div svg{
  stroke: rgba(255,255,255,0.7);
}

.list div:hover svg{
  stroke: #16c784;
}
.list div:hover{
  background: rgba(22,199,132,0.08);
}
.icon-btn{
  display:flex;
  align-items:center;
  justify-content:center;

  width:38px;
  height:38px;

  border-radius:50%;
  border:none;

  background: rgba(255,255,255,0.08);
  color:white;

  cursor:pointer;
  transition:0.2s;
}

.icon-btn:hover{
  background:#111;
}

.icon-btn svg{
  stroke:white;
}
</style>
</head>

<body>
<div class="profile-page">
<!-- NAV TOP -->
<div class="nav">
  <div class="nav-left">
    <button class="icon-btn" onclick="back()">
      <i data-lucide="arrow-left"></i>
    </button>
  </div>

 <div class="nav-center logo">ZEVL</div>

  <div class="nav-right"></div>
</div>

<div class="profile-wrapper">

  <!-- USER HEADER -->
  <div class="profile-header">
  <div class="avatar"></div>

  <div>
    <h2 id="displayName">Loading...</h2>
    <p id="displayEmail"></p>
  </div>
</div>

  <!-- STATS -->
  <div class="profile-stats">
    <div class="stat-card" onclick="goWishlist()">
      <i data-lucide="heart"></i>
      <p>Wishlist</p>
      <h3 id="wishlistCount">0</h3>
    </div>

<div class="stat-card" onclick="goCart()">
  <i data-lucide="shopping-cart"></i>
  <p>Cart</p>
  <h3 id="cartCount">0</h3>
</div>
  </div>

 <div class="section">
  <h3>Account Settings</h3>

  <div class="card">

    <input id="name" placeholder="Name" disabled>
    <input id="phone" placeholder="Phone (+260...)" disabled>
    <input id="address" placeholder="Zambia Address" disabled>
    <input id="email" placeholder="Email" disabled>

    <button id="editBtn" class="edit-btn" onclick="toggleEdit()">Edit Profile</button>
    <button class="save-btn" onclick="save()">Save Changes</button>

    <p id="msg"></p>
  </div>

</div>
<div class="section">
  <h3>Support</h3>

<div class="list">
  <div onclick="goReturns()">
    <i data-lucide="file-text"></i> Return Policy
  </div>

  <div onclick="goChats()">
    <i data-lucide="help-circle"></i> Help Center
  </div>

  <div onclick="goChats()">
    <i data-lucide="message-circle"></i> Contact Support
  </div>
</div>
</div>
</div>
<script>

const token = localStorage.getItem("token");
if(!token) window.location="login.html";

let editMode = false;

// ================= LOAD =================
async function load(){
try{
const res = await fetch("/api/me",{
  headers:{Authorization:"Bearer "+token}
});

const user = await res.json();

const name = user.name || "User";

document.getElementById("displayName").innerText = name;
document.getElementById("displayEmail").innerText = user.email || "";

// 🔥 generate initials
const initials = name
  .split(" ")
  .map(n => n[0])
  .join("")
  .substring(0,2)
  .toUpperCase();

document.querySelector(".avatar").innerText = initials;
// fill fields
document.getElementById("name").value = user.name || "";
document.getElementById("email").value = user.email || "";

// fallback saved
const saved = JSON.parse(localStorage.getItem("profile")) || {};

document.getElementById("phone").value = saved.phone || user.phone || "";
document.getElementById("address").value = saved.address || user.address || "";

document.getElementById("displayEmail").innerText = user.email || "";

}catch(err){
document.getElementById("msg").innerText="Failed to load profile";
}
}

// ================= TOGGLE EDIT =================
function toggleEdit(){

editMode = !editMode;

document.querySelectorAll("input").forEach(i=>{
  if(i.id !== "email"){
    i.disabled = !editMode;
  }
});

document.getElementById("editBtn").innerText =
editMode ? "Cancel Edit" : "Edit Profile";
}

// ================= VALIDATION =================
function isZambianPhone(phone){
  return /^(\\+260|0)[0-9]{9}$/.test(phone);
}
function isZambianAddress(address){

  const clean = address.toLowerCase();

  if(clean.length < 8) return false;

  const zambiaKeywords = [
    "zambia",
    "lusaka",
    "kitwe",
    "ndola",
    "livingstone",
    "chipata",
    "kabwe",
    "mufulira",
    "choma",
    "solwezi",
    "mazabuka"
  ];

  const hasLocation = zambiaKeywords.some(city => clean.includes(city));

  const hasStructure =
    clean.includes("street") ||
    clean.includes("road") ||
    clean.includes("avenue") ||
    clean.includes("rd") ||
    clean.includes("ave") ||
    clean.includes("plot") ||
    clean.includes(",");

  return hasLocation || hasStructure;
}

// ================= SAVE =================
function save(){

const name = document.getElementById("name").value.trim();
const phone = document.getElementById("phone").value.trim();
const address = document.getElementById("address").value.trim();

if(!name || !phone || !address){
showMsg("All fields are required", "red");
return;
}

if(!isZambianPhone(phone)){
showMsg("Invalid Zambian phone number", "red");
return;
}

if(!isZambianAddress(address)){
  showMsg("Please enter a valid Zambian address", "red");
  return;
}

const profile = { name, phone, address };

localStorage.setItem("profile", JSON.stringify(profile));

showMsg("Profile updated successfully", "#16c784");

toggleEdit();
}

// ================= MSG =================
function showMsg(text, color){
const msg = document.getElementById("msg");
msg.style.color = color;
msg.innerText = text;
}

// BACK
function back(){
window.location="buyer-dashboard.html";
}

async function loadWishlistCount(){
  try{
    const res = await fetch("/api/wishlist",{
      headers:{ Authorization:"Bearer "+token }
    });

    const data = await res.json();
    document.getElementById("wishlistCount").innerText = data.length;

  }catch{
    document.getElementById("wishlistCount").innerText = "0";
  }
}


async function loadCartCount(){
  try{
    const res = await fetch("/api/cart",{
      headers:{ Authorization:"Bearer "+token }
    });

    const data = await res.json();

    document.getElementById("cartCount").innerText = data.length;

  }catch{
    document.getElementById("cartCount").innerText = "0";
  }
}

load();
loadWishlistCount();
loadCartCount();

function goCart(){
  window.location = "cart.html";
}

function goWishlist(){
  window.location = "wishlist.html";
}

function goReturns(){
  window.location = "returns.html";
}

function goChats(){
  window.location = "buyer-chats.html";
}

load();
setTimeout(() => {
  lucide.createIcons();
}, 0);
</script>

</body>
</html>
