<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>
<title>Chat Inbox</title>

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;

  background:
    radial-gradient(circle at 30% 20%, rgba(120,80,255,0.10), transparent 45%),
    radial-gradient(circle at 70% 40%, rgba(0,200,255,0.08), transparent 50%),
    linear-gradient(180deg, #0f1115 0%, #141821 100%);

  color: white;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, rgba(22,199,132,0.05), transparent 65%);
  pointer-events: none;
}
/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;

  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(12px);

  border-bottom: 1px solid rgba(255,255,255,0.08);

  position: sticky;
  top: 0;
  z-index: 9999;
}

.nav-center{
  font-weight:700;
  font-size:20px;
}

.icon-btn{
  width:38px;
  height:38px;
  min-width:38px;
  min-height:38px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:50%;
  border:none;
  background:#f5f5f5;
  cursor:pointer;

  transition:0.2s;
  flex-shrink:0;
}

.icon-btn svg{
  width:18px !important;
  height:18px !important;
  stroke:#111;
  stroke-width:2;
}

/* hover effect (same for ALL icons) */
.icon-btn:hover{
  background:#111;
}

.icon-btn:hover svg{
  stroke:white;
}

.icon-btn:active{
  transform:none;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:40px auto;
  padding:0 20px;
}
/* CHAT ITEM */
.chat-card{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:16px 18px;
  border-radius:16px;

  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(10px);

  border: 1px solid rgba(255,255,255,0.08);

  margin-bottom:14px;

  cursor:pointer;

  transition: all 0.25s ease;

  opacity: 0;
  transform: translateY(10px);
}

.chat-card:hover{
  transform: translateY(-4px);
  background: rgba(255,255,255,0.06);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.4),
    0 0 20px rgba(22,199,132,0.08);
}
.chat-card.show{
  opacity: 1;
  transform: translateY(0);
}

.left{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.name{
  font-weight:600;
  font-size:15px;
}

.msg{
  font-size:13px;
  color: rgba(255,255,255,0.6);
}

.time{
  font-size:12px;
  color: rgba(255,255,255,0.4);
}

.empty{
  text-align:center;
  color:#777;
  margin-top:40px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div>
    <button class="icon-btn" onclick="goBack()">
      <i data-lucide="arrow-left"></i>
    </button>
  </div>

  <div class="nav-center">💬 Chat Inbox</div>

  <div>
   <button class="icon-btn" onclick="goDashboard()" title="Dashboard">
  <i data-lucide="home"></i>
</button>
  </div>
</div>

<!-- CONTENT -->
<div class="container">
  <div id="chatList">Loading chats...</div>
</div>

<script>

const token = localStorage.getItem("token");
if(!token) window.location="login.html";

/* LOAD CHATS */
async function loadChats(){
  const box = document.getElementById("chatList");

  try{
    const res = await fetch("/api/buyer/chats",{
      headers:{Authorization:"Bearer "+token}
    });

   const chats = await res.json();

box.innerHTML = "";

if(!chats || chats.length === 0){
  box.innerHTML = "<p class='empty'>No chats yet</p>";
  return;
}
chats.forEach((c, index) => {

  const div = document.createElement("div");
  div.className = "chat-card";

  div.onclick = () => openChat(
    c.seller_id,
    c.seller_name,
    c.product_id,
    c.product_name
  );

  div.innerHTML = `
    <div class="left">
      <div class="name">${c.seller_name}</div>

      <div class="msg">
        📦 ${c.product_name}<br>
        💬 ${c.last_message || ""}
      </div>
    </div>

    <div class="time">
      ${c.updated_at ? new Date(c.updated_at).toLocaleDateString() : ""}
    </div>
  `;

  box.appendChild(div);

  // ✨ stagger animation (THIS = premium feel)
  setTimeout(() => {
    div.classList.add("show");
  }, index * 80);

});
  }catch(err){
    box.innerHTML = "<p class='empty'>Failed to load chats</p>";
  }
}

function openChat(sellerId, sellerName, productId, productName){
  window.location =
  `/chat.html?seller_id=${sellerId}&seller_name=${encodeURIComponent(sellerName)}&product_id=${productId}&product_name=${encodeURIComponent(productName)}`;
}
/* NAV */
function goBack(){
  window.history.back();
}

function goDashboard(){
  const role = localStorage.getItem("role");

  if(role === "buyer"){
    window.location = "/buyer-dashboard.html";
  } else {
    window.location = "/products.html";
  }
}
/* INIT */
loadChats();
lucide.createIcons();

</script>

</body>
</html>
