<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <title>Login | Zambia EV Landscape</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
:root {
  --ev-green: #16c784;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;

  background:
    radial-gradient(circle at 30% 20%, rgba(120,80,255,0.10), transparent 45%),
    radial-gradient(circle at 70% 40%, rgba(0,200,255,0.08), transparent 50%),
    linear-gradient(180deg, #0f1115 0%, #141821 100%);

  color: white;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;

  background: radial-gradient(circle at center, rgba(22,199,132,0.04), transparent 65%);
  pointer-events: none;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;

  background: transparent;
  border-bottom: none;

  position: absolute;
  top: 10px;
  left: 0;
  width: 100%;
  z-index: 99999;
}

.nav-left, .nav-right{
  display:flex;
  align-items:center;
  gap:10px;
}

.nav-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

/* ICON BTN */
.icon-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:38px;
  height:38px;
  border-radius:50%;
  border:none;
  background:#f5f5f5;
  cursor:pointer;
  transition:0.2s;
}

.icon-btn:hover{
  background:#111;
  color:white;
}

/* LOGO */
.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 44px;
  letter-spacing: 8px;
  font-weight: 600;
  color: white;
}

/* FORM CONTAINER */
.form-container {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(12px);

  padding: 35px;
  border-radius: 18px;
  width: 360px;

  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);

  color: white;
}

.card:hover {
  box-shadow: 0 25px 60px rgba(0,0,0,0.25),
              0 0 40px rgba(22,199,132,0.10);
}

.card h2 {
  text-align: center;
  margin-bottom: 10px;
}

.subtitle {
  text-align:center;
  font-size:14px;
  color:rgba(255,255,255,0.6);
  margin-bottom:20px;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;

  border-radius: 10px;
   background: rgba(255,255,255,0.05) !important;
  border: 1px solid rgba(255,255,255,0.12) !important;
  color: white !important;

  font-size: 14px;
}

input::placeholder {
  color: rgba(255,255,255,0.5);
}

/* BUTTON */
button.login-btn {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: var(--ev-green);
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
  transition: 0.3s;
}

button.login-btn:hover {
  transform: scale(1.03);
}
.login-text {
  text-align: center;
  margin-top: 15px;
  font-size: 14px;
}

.login-text a {
  color: #16c784;
  text-decoration: none;
  font-weight: 600;
}

/* FOOTER */
.footer {
  text-align:center;
  margin-top:15px;
  font-size:14px;
}

.footer a {
  color: var(--ev-green);
  text-decoration:none;
  font-weight:600;
}
  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-left">
    <button class="icon-btn" onclick="goBack()" title="Back">
      <i data-lucide="arrow-left"></i>
    </button>
  </div>

  <div class="nav-center logo">
    ZEVL
  </div>

  <div class="nav-right"></div>
</div>

<!-- FORM -->
<div class="form-container">
  <div class="card">

    <h2>Welcome Back</h2>
    <div class="subtitle">Login to continue</div>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button class="login-btn" onclick="login()">Login</button>

    <div class="login-text">
  Already have an account?
  <a href="register.html">Create Account</a>
</div>


  </div>
</div>

<script>
async function login(){

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

if(!email || !password){
alert("Fill all fields");
return;
}

try{

const res = await fetch("/api/login",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ email, password })
});

const data = await res.json();

if(!res.ok){
alert(data.message);
return;
}

localStorage.setItem("token", data.token);
localStorage.setItem("role", data.role);
localStorage.setItem("name", data.name);

if(data.role === "seller"){
window.location.href = "products.html";
}else{
window.location.href = "buyer-dashboard.html";
}

}catch(err){
alert("Server error");
}
}

function goBack(){
  window.history.back();
}

lucide.createIcons();
</script>

</body>
</html>
