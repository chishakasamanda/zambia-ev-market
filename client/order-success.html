<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<title>Order Placed</title>

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;

  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;

  background:
    radial-gradient(circle at 30% 20%, rgba(120,80,255,0.10), transparent 45%),
    radial-gradient(circle at 70% 40%, rgba(0,200,255,0.08), transparent 50%),
    linear-gradient(180deg, #0f1115 0%, #141821 100%);

  color: white;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, rgba(22,199,132,0.05), transparent 65%);
  pointer-events: none;
}
.nav {
  position: fixed;
  top:0;
  left:0;
  right:0;

  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;

  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(12px);

  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.card{
  margin-top:80px;

  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(14px);

  padding:35px;
  border-radius:20px;
  width:380px;
  text-align:center;

  border:1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 20px 60px rgba(0,0,0,0.6),
    0 0 40px rgba(22,199,132,0.08);

  animation: pop 0.4s ease;
}

@keyframes pop{
  from{ transform: scale(0.9); opacity:0; }
  to{ transform: scale(1); opacity:1; }
}

h1{
  margin-bottom:10px;
  font-size:22px;
}

p{
  color: rgba(255,255,255,0.6);
  font-size:14px;
  margin-bottom:25px;
}

.badge{
  font-size:40px;
  margin-bottom:10px;
}

/* BUTTON */
/* BUTTONS */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:600;

  background:linear-gradient(135deg,#16c784,#00c2ff);
  color:white;

  transition:0.25s ease;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(22,199,132,0.25);
}

.secondary{
  margin-top:10px;
  background: rgba(255,255,255,0.08);
}

.secondary:hover{
  background: rgba(255,255,255,0.12);
}

.small-text{
  margin-top:15px;
  font-size:13px;
  color:#777;
}
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);

  display:flex;
  justify-content:center;
  align-items:center;

  opacity:0;
  pointer-events:none;
  transition:0.25s;
}

.modal.show{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  background: rgba(20,24,33,0.95);
  backdrop-filter: blur(12px);

  padding:25px;
  border-radius:18px;
  width:420px;
  max-height:80vh;
  overflow-y:auto;

  border:1px solid rgba(255,255,255,0.08);
}

/* sections */
.section{
  margin-bottom:18px;
  text-align:left;
}

.section-title{
  font-size:13px;
  font-weight:600;
  color:#999;
  margin-bottom:6px;
  text-transform:uppercase;
}

.row{
  display:flex;
  justify-content:space-between;
  font-size:14px;
  margin:4px 0;
}

.highlight{
  color:#16c784;
  font-weight:600;
}

/* items */
.item{
  display:flex;
  justify-content:space-between;
  background:#f7f9fb;
  padding:8px 10px;
  border-radius:10px;
  margin-bottom:6px;
  font-size:13px;
}

/* total */
.total{
  display:flex;
  justify-content:space-between;
  font-size:16px;
  font-weight:700;
  margin-top:10px;
}


</style>
</head>

<body>

<div class="card">

<div class="badge">🎉</div>

<h1>Order Placed!</h1>

<p>
Your order has been successfully received.<br>
Our delivery agent will contact you soon.
</p>

<button onclick="goHome()">Continue Shopping</button>

<button onclick="openSummary()" style="margin-top:10px; background:#111;">
View Order Summary
</button>

<button onclick="openEdit()" style="margin-top:10px; background:#555;">
Edit Address
</button>

<div class="small-text">
ZEVL
</div>

</div>
<script>

const agents = ["John M.", "Kelvin Z.", "Chanda B."];

let currentOrderId = null;
let currentOrder = null;

// ================= LOAD ORDER =================
async function loadOrder(){
  try{
    const res = await fetch("/api/orders", {
      headers:{ Authorization:"Bearer " + localStorage.getItem("token") }
    });

    const data = await res.json();
    const o = Array.isArray(data) ? data[data.length - 1] : data;

    if(!o || !o.id){
      return;
    }

    if(!o.agent){
      o.agent = agents[Math.floor(Math.random()*agents.length)];
    }

    currentOrderId = o.id;
    currentOrder = o;

  }catch(err){
    console.error("Order load failed", err);
  }
}

// ================= ORDER SUMMARY =================
async function openSummary(){

  if(!currentOrder){
    await loadOrder();
  }

  if(!currentOrder){
    alert("No order found");
    return;
  }

  const deliveryAgent = currentOrder.agent;
  const eta = currentOrder.eta || "30 - 60 mins";

  // ✅ FIX: build items FIRST (outside template)
  const itemsHTML = Array.isArray(currentOrder.items)
    ? currentOrder.items.map(i =>
        `<li>${i.name} x ${i.quantity} — ZMW ${i.price * i.quantity}</li>`
      ).join("")
    : `<li>${currentOrder.items || "No items available"}</li>`;

  document.getElementById("modal").classList.add("show");

  document.getElementById("modalContent").innerHTML = `
    <h3 style="margin-bottom:10px;">Order Details</h3>

    <p><b>Order ID:</b> #${currentOrder.id}</p>
    <p><b>Status:</b> 
      <span style="color:#16c784;">
        ${currentOrder.status || "Processing"}
      </span>
    </p>

    <hr>

    <p><b>Customer:</b> ${currentOrder.name}</p>
    <p><b>Phone:</b> ${currentOrder.phone}</p>
    <p><b>Address:</b> ${currentOrder.address}</p>

    <hr>

    <p><b>Delivery Service:</b> Yango</p>
    <p><b>Delivery Agent:</b> ${deliveryAgent}</p>
    <p><b>Estimated Delivery:</b> ${eta}</p>

    <hr>

    <p><b>Payment:</b> ${currentOrder.payment_method || "Cash on Delivery"}</p>

    <hr>

    <p><b>Items:</b></p>
    <ul style="padding-left:18px;">
      ${itemsHTML}
    </ul>

    <button onclick="closeModal()" style="margin-top:15px;">Close</button>
  `;
}
// ================= EDIT =================
function openEdit(){

  if(!currentOrder){
    alert("Load order first");
    return;
  }

  document.getElementById("modal").classList.add("show");

  document.getElementById("modalContent").innerHTML = `
    <h3>Edit Address</h3>

    <input id="name" value="${currentOrder.name}">
    <br><br>

    <input id="phone" value="${currentOrder.phone}">
    <br><br>

    <input id="address" value="${currentOrder.address}">
    <br><br>

    <button onclick="saveAddress()">Save</button>
    <button onclick="closeModal()" style="margin-top:5px;background:#999;">Cancel</button>
  `;
}

// ================= SAVE =================
async function saveAddress(){

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;

  await fetch(`/api/orders/${currentOrderId}`, {
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+localStorage.getItem("token")
    },
    body: JSON.stringify({ name, phone, address })
  });

  alert("Updated successfully");
  await loadOrder();
  closeModal();
}

// ================= UI =================
function closeModal(){
  document.getElementById("modal").classList.remove("show");
}

function goHome(){
  window.location = "buyer-dashboard.html";
}

// ================= INIT =================
window.onload = () => {
  if(!localStorage.getItem("token")){
    window.location = "login.html";
  }
  loadOrder();
};

</script>


<div id="modal" class="modal">
  <div class="modal-box" id="modalContent"></div>
</div>
</body>
</html>
