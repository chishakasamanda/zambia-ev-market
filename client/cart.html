<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <title>Cart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;

  background:
    radial-gradient(circle at 20% 10%, rgba(22,199,132,0.08), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(0,194,255,0.08), transparent 50%),
    linear-gradient(180deg, #0f1115 0%, #141821 100%);

  color: white;
}
body::after{
  content:"";
  position:fixed;
  width:300px;
  height:300px;
  background:radial-gradient(circle, rgba(22,199,132,0.12), transparent 70%);
  top:40%;
  left:60%;
  filter:blur(40px);
  pointer-events:none;
}
/* PAGE WRAPPER */
.container{
  padding: 40px;
  margin-top: 20px; /* 👈 ADD THIS */
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  border-bottom:1px solid #eee;
  background:white;
}

.logo{
  font-size:22px;
  font-weight:700;
  color:#00c896;
}
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;

  background: rgba(20,24,33,0.75);
  backdrop-filter: blur(14px);

  border-bottom: 1px solid rgba(255,255,255,0.08);

  position: sticky;
  top: 0;
  z-index: 1000;

  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.nav-left, .nav-right{
  display:flex;
  align-items:center;
  gap:10px;
}

.nav-center{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-family: 'Cormorant Garamond', serif;
  font-size: 44px;
  letter-spacing: 8px;
  font-weight: 600;
  color: white;
}
.nav-btn{
  background:#111;
  color:white;
  padding:10px 18px;
  border-radius:20px;
  border:none;
  cursor:pointer;
}
.nav-btn{
  background:#111;
  color:white;
  padding:10px 18px;
  border-radius:20px;
  border:none;
  cursor:pointer;
}
.nav::after{
  content:"";
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:1px;
  background:linear-gradient(90deg,#16c784,#3aa0ff);
   opacity:0.3;
}
/* CART ITEM */
.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;

  background: rgba(20,24,33,0.7);
  backdrop-filter: blur(14px);

  padding:20px;
  border-radius:20px;

  margin-bottom:16px;

  border:1px solid rgba(255,255,255,0.06);

box-shadow:
  0 10px 30px rgba(0,0,0,0.5),
  0 0 15px rgba(22,199,132,0.03);

  transition:0.3s ease;
}

.item:hover{
  transform:translateY(-6px) scale(1.01);
  box-shadow:
    0 20px 40px rgba(0,0,0,0.7),
    0 0 25px rgba(22,199,132,0.15);
}

.item-left{
  display:flex;
  gap:15px;
  align-items:center;
}

.item img{
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:12px;

  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

.item-left h4{
  margin:0;
}

.item-left p{
  margin:4px 0 0;
   color:rgba(255,255,255,0.6);
}
.item:not(:last-child){
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

/* CONTROLS */
.controls{
  display:flex;
  align-items:center;
  gap:10px;
}

.controls button{
  padding:6px 12px;
  border:none;
  border-radius:10px;

  background: rgba(255,255,255,0.08);
  color:white;

  cursor:pointer;
  transition:0.2s;
}

.controls button:hover{
  background: rgba(255,255,255,0.15);
}

.controls .delete-btn{
  background: rgba(255,77,77,0.2);
  color:#ff4d4d;
}

.controls .delete-btn:hover{
  background:#ff4d4d;
  color:white;
}
.controls button:active,
.icon-btn:active,
.checkout-btn:active{
  transform: scale(0.95);
}
/* TOTAL */
.total{
  margin-top:30px;
  font-size:24px;
  font-weight:600;

  padding:16px 20px;
  border-radius:16px;

  background: rgba(20,24,33,0.7);
  backdrop-filter: blur(10px);

  border:1px solid rgba(255,255,255,0.06);

  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.checkout-btn{
  padding:14px 34px;
  border-radius:30px;

  background:linear-gradient(135deg,#16c784,#3aa0ff);
  color:white;

  font-weight:600;
  letter-spacing:0.3px;

  border:1px solid rgba(255,255,255,0.2);

  box-shadow:
    0 10px 30px rgba(22,199,132,0.25),
    inset 0 0 10px rgba(255,255,255,0.1);

  transition:0.25s ease;
}

.checkout-btn:hover{
  transform:translateY(-3px) scale(1.03);

  box-shadow:
    0 15px 40px rgba(22,199,132,0.4),
    0 0 20px rgba(58,160,255,0.3);
}

/* HIDDEN */
.hidden{
  display:none;
}
.icon-btn{
  display:flex;
  align-items:center;
  justify-content:center;

  width:38px;
  height:38px;

  border-radius:50%;
  border:none;

  background: rgba(255,255,255,0.08);
  cursor:pointer;
  transition:0.25s ease;
}

.icon-btn svg{
  stroke:white;
}

.icon-btn:hover{
  background: linear-gradient(135deg,#16c784,#3aa0ff);
  box-shadow: 0 0 15px rgba(22,199,132,0.4);
}

.checkout-wrapper{
  display:flex;
  justify-content:center;
  margin-top:20px;
}

.checkout-btn{
  padding:12px 30px;
  width:auto;            /* removes full width */
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#16c784,#00c2ff);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.25s ease;
}

.checkout-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(22,199,132,0.25);
}
.cart-shell{
  max-width:900px;
  margin:40px auto;

  padding:25px;

  border-radius:24px;

  background: rgba(20,24,33,0.6);
  backdrop-filter: blur(20px);

  border:1px solid rgba(255,255,255,0.06);

  box-shadow:
    0 30px 80px rgba(0,0,0,0.7),
    0 0 40px rgba(22,199,132,0.05);

  position:relative;
  overflow:hidden;
}

/* subtle glow line like your panel */
.cart-shell::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:2px;
  background:linear-gradient(90deg,#16c784,#3aa0ff);
  opacity:0.7;
}
.cart-title{
  font-size:20px;
  font-weight:600;
  margin-bottom:20px;

  display:flex;
  align-items:center;
  gap:8px;

  color:white;
  opacity:0.9;
}
</style>
</head>

<body>

<div class="nav">

  <!-- LEFT -->
  <div class="nav-left">
<button class="icon-btn" onclick="back()" title="Back">
  <i data-lucide="arrow-left"></i>
</button>
  </div>

  <!-- CENTER -->
  <div class="nav-center">
    ZEVL
  </div>

  <!-- RIGHT -->
  <div class="nav-right">

  <button class="icon-btn" onclick="goWishlist()" title="Wishlist">
    <i data-lucide="heart"></i>
  </button>

</div>

</div>

<!-- PAGE CONTENT WRAPPER -->
<div class="container">

  <div class="cart-shell">  <!-- ADD THIS -->

   <h2 class="cart-title">
      Your Cart
</h2>

    <div id="cartList"></div>
    <div class="total" id="total"></div>

    <div class="checkout-wrapper hidden" id="checkoutBtn">
      <button class="checkout-btn" onclick="goToCheckout()">
        Proceed to Checkout
      </button>
    </div>

  </div> <!-- END -->

</div>

<script>

const token = localStorage.getItem("token");
if(!token) window.location="login.html";

let currentCart = [];

// ================= NAV =================
function back(){
  window.location="buyer-dashboard.html";
}

// ================= CHECKOUT =================
function goToCheckout(){
  if(currentCart.length === 0){
    alert("Your cart is empty");
    return;
  }
  window.location = "checkout.html";
}

// ================= LOAD CART =================
async function loadCart(){
try{

const res = await fetch("/api/cart",{
headers:{ Authorization:"Bearer "+token }
});

if(!res.ok) throw new Error();

const data = await res.json();
currentCart = data;

const list = document.getElementById("cartList");
const checkoutBtn = document.getElementById("checkoutBtn");

list.innerHTML = "";

let total = 0;

// EMPTY
if(data.length === 0){
  list.innerHTML = "<p>Your cart is empty</p>";
  document.getElementById("total").innerText = "";
document.getElementById("checkoutBtn").classList.remove("hidden");
  return;
}

// SHOW BUTTON
checkoutBtn.classList.remove("hidden");

data.forEach(p=>{

total += p.price * p.quantity;

list.innerHTML += `
<div class="item">

  <div class="item-left">
    <img src="${p.image_url}" onerror="this.style.display='none'">
    <div>
      <h4>${p.name}</h4>
      <p>ZMW ${p.price}</p>
    </div>
  </div>

  <div class="controls">
    <button onclick="updateQty(${p.id}, ${p.quantity-1})">−</button>
    <span>${p.quantity}</span>
    <button onclick="updateQty(${p.id}, ${p.quantity+1})">+</button>
   <button class="delete-btn" onclick="removeItem(${p.id})" title="Remove item">
  <i data-lucide="trash-2"></i>
</button>
  </div>

</div>
`;
});

lucide.createIcons(); 

document.getElementById("total").innerText = "Total: ZMW " + total;

}catch(err){
console.log(err);
alert("Failed to load cart");
}
}

// ================= UPDATE =================
async function updateQty(id, qty){

if(qty < 1) return;

await fetch("/api/cart/update",{
method:"PUT",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({
product_id:id,
quantity:qty
})
});

loadCart();
}

// ================= REMOVE =================
async function removeItem(id){

if(!confirm("Remove this item from cart?")) return;

await fetch("/api/cart/update",{
method:"PUT",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({
product_id:id,
quantity:0
})
});

loadCart();
}

function goWishlist(){
  window.location = "wishlist.html";
}
// INIT
loadCart();
 lucide.createIcons();

</script>

</body>
</html>
