<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<title>Checkout</title>

<style>
  
  body {
  margin: 0;
  font-family: 'Poppins', sans-serif;

  background:
    radial-gradient(circle at 30% 20%, rgba(120,80,255,0.10), transparent 45%),
    radial-gradient(circle at 70% 40%, rgba(0,200,255,0.08), transparent 50%),
    linear-gradient(180deg, #0f1115 0%, #141821 100%);

  color: white;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, rgba(22,199,132,0.05), transparent 65%);
  pointer-events: none;
}
.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 44px;
  letter-spacing: 8px;
  font-weight: 600;
  color: white;
}

.container{
  padding:30px 20px;
  max-width:1000px;
  margin:auto;
}

.header h2{ margin:10; }
.header p{ color:#666; }

.checkout-grid{
  display:grid;
  grid-template-columns:1.2fr 0.8fr;
  gap:20px;
}

@media(max-width:768px){
  .checkout-grid{ grid-template-columns:1fr; }
}

.card{
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(12px);

  padding:25px;
  border-radius:18px;

  border:1px solid rgba(255,255,255,0.08);
}
input, textarea, select{
  width:100%;
  padding:12px;
  margin:8px 0;

  border-radius:10px;
  border:1px solid rgba(255,255,255,0.1);

  background: rgba(255,255,255,0.05);
  color: white;

  font-family:'Poppins',sans-serif;
}

input::placeholder, textarea::placeholder{
  color: rgba(255,255,255,0.5);
}

.small-btn{
  margin-top:5px;
  padding:8px;
  border:none;
  border-radius:20px;
  background:#111;
  color:white;
  cursor:pointer;
  font-size:12px;
}

.summary-item{
  display:flex;
  justify-content:space-between;
  margin:8px 0;
}

.summary-total{
  margin-top:15px;
  border-top:1px solid #eee;
  padding-top:10px;
  font-weight:600;
}

button{
  margin-top:20px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:30px;

  background:linear-gradient(135deg,#16c784,#00c2ff);

  color:white;
  font-weight:600;
  cursor:pointer;

  transition:0.25s ease;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(22,199,132,0.25);
}

.hidden{
  display:none;
}
.icon-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:52px;
  height:52px;
  border-radius:50%;
  border:none;
  background:#f5f5f5;
  cursor:pointer;
  transition:0.2s;
}

.icon-btn:hover{
  background:#111;
}

.icon-btn:hover svg{
  stroke:white;
}

.icon-btn svg{
  width:26px;
  height:26px;
  stroke:#111; /* IMPORTANT FIX */
}
.nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;

  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(12px);

  border-bottom: 1px solid rgba(255,255,255,0.08);

  position: sticky;
  top: 0;
  z-index: 1000;
}

.nav-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.nav-left, .nav-right{
  display:flex;
  align-items:center;
  gap:10px;
}
select {
  color: white;
  background-color: rgba(255,255,255,0.05);
}

select:focus {
  color: black;          /* 👈 change to black */
  background: white;  
}
.toast{
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);

  background: rgba(20,24,33,0.9);
  backdrop-filter: blur(12px);

  color: white;
  padding: 14px 22px;
  border-radius: 30px;

  border: 1px solid rgba(255,255,255,0.08);

  font-size: 14px;
  letter-spacing: 0.3px;

  opacity: 0;
  transition: 0.3s ease;
  z-index: 9999;
}

.toast.show{
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Variants */
.toast.success{
  border: 1px solid rgba(22,199,132,0.4);
}

.toast.error{
  border: 1px solid rgba(255,80,80,0.4);
}

.toast.info{
  border: 1px solid rgba(0,194,255,0.4);
}

</style>
</head>

<body>
 <div class="nav">
  <div class="nav-left">
    <button class="icon-btn" onclick="back()" title="Back">
      <i data-lucide="arrow-left"></i>
    </button>
  </div>

  <div class="nav-center logo">
    ZEVL
  </div>

  <div class="nav-right"></div>
</div>

<div class="container">

<div class="header">
  <h2>Checkout</h2>
</div>

<div class="checkout-grid">

<!-- LEFT -->
<div class="card">
<h3>Delivery Details</h3>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Zambian Phone (e.g. 097xxxxxxx)">
<textarea id="address" placeholder="Delivery Address (e.g. Lusaka, Kabulonga)"></textarea>

<button class="small-btn" onclick="saveAddress()">Save Details</button>
<button class="small-btn" onclick="applySaved()">Use Saved Address</button>

<h3>Payment Method</h3>

<select id="payment" onchange="togglePayment()">
  <option value="cod">Cash on Delivery</option>
  <option value="mtn">MTN Money</option>
  <option value="airtel">Airtel Money</option>
   <option value="card">Visa / Mastercard</option>
</select>

<p style="font-size:12px; color:rgba(255,255,255,0.6); margin-top:5px;">
Payments are securely processed. Mobile Money requires confirmation on your phone.
</p>

<input id="payPhone" class="hidden" placeholder="Mobile Money Number">

<div id="cardFields" class="hidden">

  <input id="cardNumber" placeholder="Card Number (4242 4242 4242 4242)">

  <div style="display:flex; gap:10px;">
    <input id="cardExpiry" placeholder="MM/YY">
    <input id="cardCVV" placeholder="CVV">
  </div>

</div>
</div>

<!-- RIGHT -->
<div class="card">
<h3>Order Summary</h3>
<div id="summary">Loading...</div>

<button onclick="placeOrder()">Place Order</button>

</div>

</div>
</div>
<div id="toast" class="toast hidden"></div>

<script>
  
window.alert = function(message){
  showToast(message, "info");
};

const token = localStorage.getItem("token");
if(!token) window.location="login.html";

// DOM helpers (IMPORTANT FIX)
const nameInput = document.getElementById("name");
const phoneInput = document.getElementById("phone");
const addressInput = document.getElementById("address");
const payPhoneInput = document.getElementById("payPhone");

function back(){
  window.location = "cart.html";
}

// ================= CART =================
async function loadCart(){
const res = await fetch("/api/cart",{headers:{Authorization:"Bearer "+token}});
const data = await res.json();

let total=0;
let html="";

data.forEach(item=>{
total += item.price * item.quantity;

html += `
<div class="summary-item">
  <span>${item.name} x ${item.quantity}</span>
  <span>ZMW ${(item.price * item.quantity).toFixed(2)}</span>
</div>
`;
});

html += `<div class="summary-total">Total: ZMW ${total}</div>`;
document.getElementById("summary").innerHTML = html;
lucide.createIcons();

}
loadCart();

// ================= VALIDATION =================
function isValidZambianPhone(phone){
return /^(\+260|0)[7-9][0-9]{8}$/.test(phone);
}

function isValidZambianAddress(addr){
const keywords = ["lusaka","kitwe","ndola","kabwe","livingstone","zambia"];
return keywords.some(k => addr.toLowerCase().includes(k));
}

// ================= SAVE =================
function saveAddress(){

const name = nameInput.value.trim();
const phone = phoneInput.value.trim();
const address = addressInput.value.trim();

if(!name || !phone || !address){
alert("Fill all fields before saving");
return;
}

if(!isValidZambianPhone(phone)){
alert("Enter valid Zambian phone number");
return;
}

if(!isValidZambianAddress(address)){
alert("Enter valid Zambian address (Lusaka, Kitwe, etc.)");
return;
}

localStorage.setItem("profile", JSON.stringify({name,phone,address}));

alert("Address saved successfully");
}

// ================= APPLY =================
function applySaved(){
const saved = JSON.parse(localStorage.getItem("profile"));

if(!saved){
alert("No saved address found");
return;
}

nameInput.value = saved.name || "";
phoneInput.value = saved.phone || "";
addressInput.value = saved.address || "";
}

// ================= PAYMENT TOGGLE =================
function togglePayment(){
  const method = document.getElementById("payment").value;

  const cardFields = document.getElementById("cardFields");

  if(method === "mtn" || method === "airtel"){
    payPhoneInput.classList.remove("hidden");
    cardFields.classList.add("hidden");
  }
  else if(method === "card"){
    payPhoneInput.classList.add("hidden");
    cardFields.classList.remove("hidden");
  }
  else{
    payPhoneInput.classList.add("hidden");
    cardFields.classList.add("hidden");
  }
}

// ================= ORDER =================
async function placeOrder(){

const payment = document.getElementById("payment").value;


const order = {
name: nameInput.value.trim(),
phone: phoneInput.value.trim(),
address: addressInput.value.trim(),
payment_method: payment,
payment_phone: payPhoneInput.value.trim()
};

// VALIDATION
if(!order.name || !order.phone || !order.address){
alert("⚠ Please fill all delivery details");
return;
}

if(!isValidZambianPhone(order.phone)){
alert("⚠ Enter valid Zambian phone number");
return;
}

if(!isValidZambianAddress(order.address)){
alert("⚠ Enter valid Zambian address");
return;
}

if((payment === "mtn" || payment === "airtel") && !isValidZambianPhone(order.payment_phone)){
alert("⚠ Enter valid Mobile Money number");
return;
}
// 🔐 UNIVERSAL PAYMENT STEP (for ALL methods)
alert("🔐 Securing your transaction...");
await new Promise(r => setTimeout(r, 800));
// COD FLOW (FIXED)
if(payment === "cod"){

await fetch("/api/checkout",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify(order)
});

alert("✅ Order placed successfully (Cash on Delivery)");
window.location.href = "order-success.html";
return;
}
// CARD FLOW (SIMULATION)
if(payment === "card"){

  const cardNumber = document.getElementById("cardNumber").value.trim();
  const expiry = document.getElementById("cardExpiry").value.trim();
  const cvv = document.getElementById("cardCVV").value.trim();

  if(!cardNumber || !expiry || !cvv){
    alert("⚠ Fill all card details");
    return;
  }

alert("🏦 Connecting to bank...");
await new Promise(r => setTimeout(r, 1200));

alert("🔄 Verifying card...");
await new Promise(r => setTimeout(r, 1000));

  const success = Math.random() > 0.2;

  if(!success){
    alert("❌ Card declined");
    return;
  }

  alert("✅ Payment successful");

  await fetch("/api/checkout",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify(order)
  });

  window.location.href = "order-success.html";
  return;
}
// MOBILE MONEY SIMULATION
alert("📲 Waiting for mobile money prompt...");
await new Promise(r => setTimeout(r, 1500));

alert("Enter your PIN on your phone...");
await new Promise(r => setTimeout(r, 1500));

const success = Math.random() > 0.1;

if(!success){
alert("❌ Payment failed. Try again.");
return;
}

alert("✔ Payment successful");

await fetch("/api/checkout",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify(order)
});

alert("🎉 Order confirmed!");
window.location.href = "order-success.html";

}
function showToast(message, type="info") {
  const toast = document.getElementById("toast");

  toast.textContent = message;
  toast.className = `toast show ${type}`;

  setTimeout(() => {
    toast.classList.remove("show");
  }, 2500);
}
function initIcons(){
  lucide.createIcons();
}

window.onload = () => {
  loadCart();
  initIcons();
};
</script>

</body>
</html>
